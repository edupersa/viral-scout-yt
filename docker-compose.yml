services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viralscout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viralscout}
      POSTGRES_DB: ${POSTGRES_DB:-viralscout}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viralscout}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: runner
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URLs with Docker service names
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-viralscout}:${POSTGRES_PASSWORD:-viralscout}@postgres:5432/${POSTGRES_DB:-viralscout}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-viralscout}:${POSTGRES_PASSWORD:-viralscout}@postgres:5432/${POSTGRES_DB:-viralscout}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      target: runner
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
